{%- assign expertiseOrdered = site.expertise | sort:"order" %}
<div class="row row-cols-1 row-cols-md-2 g-4">
{%- for expertise in expertiseOrdered -%}
{%- if expertise.published != false -%}
<div class="col">
  <article class="card h-100">
    <div class="card-body">
      <h3 class="card-title h5"><a href="{{ expertise.url }}">{{ expertise.title }}</a></h3>
      <p class="card-text">{{ expertise.excerpt }}</p>
    </div>
  </article>
</div>
{%- endif -%}
{%- endfor -%}
</div>
